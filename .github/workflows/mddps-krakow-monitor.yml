name: Monitor MDDPS Kraków — BIP

on:
  schedule:
    # 5. każdego miesiąca o 8:00 UTC (kilka dni po 1. gdy inne monitory już działają)
    - cron: '0 8 5 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Utwórz Issue nawet jeśli data się nie zmieniła'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-bip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests

      - name: Sprawdź BIP Kraków — MDDPS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_CHECK: ${{ github.event.inputs.force || 'false' }}
        run: python scripts/monitor-mddps-krakow.py

      - name: Zapisz nową datę do repozytorium (jeśli zmieniła się)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw_dane/krakow/.mddps_last_change || true
          if git diff --cached --quiet; then
            echo "Brak zmian do zakomitowania"
          else
            git commit -m "chore: Aktualizacja daty MDDPS BIP Kraków $(date +%Y-%m-%d)"
            git push
          fi
