name: Monitor DPS PDF — Małopolska

on:
  schedule:
    # 1. i 15. każdego miesiąca o 10:00 czasu polskiego (8:00 UTC latem / 9:00 UTC zimą)
    - cron: '0 8 1,15 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Porównaj nawet jeśli PDF się nie zmienił'
        type: boolean
        default: false

jobs:
  check-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności Python
        run: pip install pdfplumber requests psycopg2-binary

      - name: Uruchom monitoring PDF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_COMPARE: ${{ github.event.inputs.force || 'false' }}
        run: python scripts/monitor-dps-pdf.py

      - name: Zapisz nowy PDF do repozytorium (jeśli jest)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "raw_dane/malopolskie/" || true
          if git diff --cached --quiet; then
            echo "Brak zmian do zakomitowania"
          else
            git commit -m "chore: Nowy wykaz DPS Małopolska $(date +%Y-%m-%d)"
            git push
          fi
