name: Monitor wolnych miejsc DPS — Małopolska

on:
  schedule:
    # 1. i 15. każdego miesiąca o 8:00 czasu polskiego (6:00 UTC latem / 7:00 UTC zimą)
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Sprawdź i utwórz Issue nawet jeśli plik się nie zmienił'
        type: boolean
        default: false

jobs:
  check-xlsx:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests openpyxl psycopg2-binary

      - name: Uruchom monitoring wolnych miejsc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_CHECK: ${{ github.event.inputs.force || 'false' }}
        run: python scripts/monitor-wolne-miejsca.py

      - name: Zapisz nowy XLSX do repozytorium (jeśli jest)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "raw_dane/malopolskie/" || true
          if git diff --cached --quiet; then
            echo "Brak zmian do zakomitowania"
          else
            git commit -m "chore: Nowy wykaz wolnych miejsc DPS $(date +%Y-%m-%d)"
            git push
          fi
