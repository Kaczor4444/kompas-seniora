name: Monitor wolnych miejsc DPS — Wielkopolskie

on:
  schedule:
    # 12. i 22. każdego miesiąca o 10:00 czasu polskiego (8:00 UTC latem / 9:00 UTC zimą)
    # PDF wychodzi ok. 10. dnia miesiąca za bieżący miesiąc
    - cron: '0 8 12,22 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Sprawdź i utwórz Issue nawet jeśli PDF się nie zmienił'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests pdfplumber urllib3

      - name: Uruchom monitoring wolnych miejsc Wielkopolskie
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FORCE_CHECK: ${{ github.event.inputs.force || 'false' }}
        run: python scripts/monitor-wolne-miejsca-wielkopolskie.py

      - name: Zapisz nowy PDF do repozytorium (jeśli jest)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "raw_dane/wielkopolskie/" || true
          if git diff --cached --quiet; then
            echo "Brak zmian do zakomitowania"
          else
            git commit -m "chore: Nowy wykaz wolnych miejsc DPS Wielkopolskie $(date +%Y-%m-%d)"
            git push
          fi
