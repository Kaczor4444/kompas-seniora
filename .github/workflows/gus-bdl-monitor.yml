name: Monitor GUS BDL — dane 2025 Małopolska

on:
  schedule:
    # 1. każdego miesiąca o 9:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Utwórz Issue nawet jeśli próg powiatów nieosiągnięty'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-gus-bdl:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj zależności
        run: pip install requests

      - name: Sprawdź dostępność danych GUS BDL 2025
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GUS_BDL_KEY: ${{ secrets.GUS_BDL_KEY }}
          FORCE_CHECK: ${{ github.event.inputs.force || 'false' }}
        run: python scripts/monitor-gus-bdl.py
